name: mugam_flutter
description: "Mugam - Music streaming app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  firebase_messaging: any
  go_router: any
  flutter_riverpod: any
  riverpod: any
  cached_network_image: any
  image_picker: any
  just_audio: any
  record: any
  google_fonts: any
  shared_preferences: any
  path_provider: any
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/record_start.wav
