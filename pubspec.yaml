name: mugam_flutter
description: "Mugam - Music streaming app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  firebase_messaging: any
  cloud_functions: any
  firebase_crashlytics: any
  go_router: any
  flutter_riverpod: any
  riverpod: any
  cached_network_image: any
  image_picker: any
  camera: ^0.12.0+1
  video_player: ^2.11.1
  flutter_video_info: ^1.3.3
  exif: ^3.3.0
  image: ^4.9.1
  native_device_orientation: ^2.1.1
  just_audio: any
  audio_session: any
  record: any
  google_fonts: any
  shared_preferences: any
  path_provider: any
  intl: any
  emoji_picker_flutter: any
  flutter_cache_manager: any
  share_plus: any
  gal: any
  device_info_plus: any
  connectivity_plus: ^7.2.0
  workmanager: ^0.9.0+3
  flutter_image_compress: ^2.4.0
  get_thumbnail_video: ^0.7.3
  pasteboard: ^0.5.0
  file_picker: ^11.0.2
  open_filex: ^4.7.0
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  # Pinned below latest (6.6.3) — every agora_rtc_engine release from
  # 6.6.2-rc.1 onward depends on ffi ^1.1.2, which conflicts with the
  # vendored third_party/file_picker's ffi ^2.1.3. 6.5.4 is the newest
  # version still on ffi >=2.0.0 <3.0.0, so it's the newest one that
  # actually resolves here.
  agora_rtc_engine: ^6.5.4
  permission_handler: ^12.0.3
  flutter_callkit_incoming: ^3.1.1
  # Pinned exact (not ^) — unmaintained (google/flutter.widgets), no
  # published fix for a known scrollTo() "long-distance teleport" bug when
  # called before itemPositions are published (see the guard in
  # _scrollToIndexExact in chat_screen.dart). Tracked for a possible move to
  # flutter/packages: https://github.com/flutter/flutter/issues/150963
  scrollable_positioned_list: 0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Vendored, locally-patched copy of file_picker — see
# third_party/file_picker/android/build.gradle's comment for why: upstream
# 11.0.2's AGP9 detection logic conflicts with this project's Kotlin setup
# (android.builtInKotlin=false, required by other plugins) and leaves
# FilePickerPlugin.kt uncompiled. Same package/version otherwise, minus
# example/test/tool. Safe to drop this override (and the third_party copy)
# once upstream fixes the AGP9 detection to check the real project
# property instead of inferring it from the AGP major version.
dependency_overrides:
  file_picker:
    path: third_party/file_picker

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/record_start.wav
    - assets/sounds/record_stop.wav
    - assets/sounds/phone-tone.wav
    - assets/sounds/success_send.wav
