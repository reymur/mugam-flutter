org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template. Tried flipping
# this to true to fix file_picker's own AGP9-vs-Kotlin-plugin detection gap
# (see third_party/file_picker's README) — broke audio_session and other
# plugins instead: they unconditionally classpath the old Kotlin Gradle
# Plugin regardless of AGP version, and AGP9 hard-rejects `com.android.
# library` outright when that jar is present on the buildscript classpath
# AND builtInKotlin=true. Two different plugin-ecosystem migration states
# can't both be satisfied by one global flag, so file_picker is patched
# locally instead (see third_party/file_picker) and this stays false, the
# setting every other plugin in this project already depends on.
android.builtInKotlin=false
